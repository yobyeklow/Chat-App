<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WebSocket Test</title>
        <style>
            body {
                font-family: Arial, sans-serif;
                max-width: 800px;
                margin: 50px auto;
                padding: 20px;
            }
            #status {
                padding: 10px;
                margin-bottom: 20px;
                border-radius: 5px;
            }
            .connected {
                background-color: #d4edda;
                color: #155724;
            }
            .disconnected {
                background-color: #f8d7da;
                color: #721c24;
            }
            #messages {
                border: 1px solid #ddd;
                height: 300px;
                overflow-y: auto;
                padding: 10px;
                margin-bottom: 20px;
                background: #f9f9f9;
            }
            .message {
                margin: 5px 0;
                padding: 5px;
                background: white;
                border-radius: 3px;
            }
            .sent {
                background: #d1ecf1 !important;
            }
            .received {
                background: #d4edda !important;
            }
            #input-area {
                display: flex;
                gap: 10px;
            }
            input,
            button {
                padding: 10px;
                font-size: 16px;
            }
            input {
                flex: 1;
            }
            button {
                cursor: pointer;
            }
        </style>
    </head>
    <body>
        <h1>WebSocket Test Client</h1>
        <div id="status" class="disconnected">Status: Disconnected</div>

        <div id="messages"></div>

        <div id="input-area">
            <input
                type="text"
                id="messageInput"
                placeholder="Type a message..."
            />
            <button onclick="sendMessage()">Send</button>
        </div>
        <div id="input-area">
            <input type="text" id="roomInput" placeholder="Type a room..." />
            <button onclick="joinRoom()">Send</button>
        </div>

        <div style="margin-top: 20px">
            <button onclick="connect()">Connect</button>
            <button onclick="disconnect()">Disconnect</button>
        </div>

        <script>
            let ws;
            const statusDiv = document.getElementById("status");
            const messagesDiv = document.getElementById("messages");
            const messageInput = document.getElementById("messageInput");
            const roomInput = document.getElementById("roomInput");

            function connect() {
                ws = new WebSocket("ws://localhost:8081/api/v1/ws/chat");

                ws.onopen = () => {
                    statusDiv.textContent = "Status: Connected";
                    statusDiv.className = "connected";
                    addMessage("Connected to WebSocket server", "received");
                };

                ws.onmessage = (event) => {
                    addMessage("Received: " + event.data, "received");
                };

                ws.onclose = () => {
                    statusDiv.textContent = "Status: Disconnected";
                    statusDiv.className = "disconnected";
                    addMessage("Disconnected from server", "received");
                };

                ws.onerror = (error) => {
                    addMessage("Error: " + error, "received");
                };
            }

            function disconnect() {
                if (ws) {
                    ws.close();
                }
            }

            function sendMessage() {
                const message = messageInput.value;
                const room = roomInput.value;
                if (ws && message) {
                    const payload = {
                        type: "room-msg",
                        data: message,
                        roomID: room,
                    };
                    ws.send(JSON.stringify(payload));
                    addMessage("Sent: " + message, "sent");
                    messageInput.value = "";
                }
            }
            function joinRoom() {
                const room = roomInput.value;
                if (ws && room) {
                    const payload = { type: "join_room", roomID: room };
                    ws.send(JSON.stringify(payload));
                    addMessage("Sent: " + message, "sent");
                    messageInput.value = "";
                }
            }
            function addMessage(text, type) {
                const div = document.createElement("div");
                div.className = "message " + type;
                div.textContent = text;
                messagesDiv.appendChild(div);
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
            }

            messageInput.addEventListener("keypress", (e) => {
                if (e.key === "Enter") {
                    sendMessage();
                }
            });
        </script>
    </body>
</html>
